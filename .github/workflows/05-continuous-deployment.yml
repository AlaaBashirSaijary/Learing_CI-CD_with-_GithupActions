name: 05 - Continuous Deployment (CD)

on:
  workflow_run:
    workflows: ["04 - Automated Release and Patch Notes"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deployment:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare files for deployment
        run: |
          echo "🔍 التأكد من استقرار النسخة قبل النشر..."
          echo "📦 النسخة: ${{ github.event.workflow_run.head_sha }}"
          echo "✅ تجهيز الملفات للنشر..."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Broadcast Status
        run: |
          echo "📢 تم النشر بنجاح!"
          echo "🌟 الرابط: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
